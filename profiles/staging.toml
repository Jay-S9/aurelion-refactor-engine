
[profile]
name = "staging"
description = "Staging environment"
created_at = "2026-04-15T18:40:48.576797+00:00"

[config]
encoding = "utf-8"
workers = 4
dry_run = false
no_backup = true
strict_mode = false
include_binary = false
exclude_dirs = [".git", "__pycache__", "node_modules", ".venv", "backups", "dist", "build"]

[paths]
project_root = "."
plans_dir = "./plans"

[rules]
default_group = "dev"
default_tags = ["dev"]
